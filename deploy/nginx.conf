# Orator — Nginx reverse proxy
# Replace YOUR_DOMAIN with the value of SITE_DOMAIN from .env
# After deploying: run `sudo certbot --nginx -d YOUR_DOMAIN` to add SSL.
#
# /api/* → FastAPI (port 8000, gunicorn + UvicornWorker)
# /      → Next.js (port 3000, PM2)

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # ── API ───────────────────────────────────────────────────────────────────
    # Research + generation can take several minutes; timeout must be generous.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  360s;
        proxy_send_timeout  360s;
        proxy_connect_timeout 10s;

        # Disable buffering so streaming responses work correctly
        proxy_buffering    off;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Next.js hot-reload websocket in dev; harmless in prod
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout  60s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Uploads ───────────────────────────────────────────────────────────────
    client_max_body_size 20M;
}

# Certbot will append the HTTPS server block here when you run:
#   sudo certbot --nginx -d YOUR_DOMAIN
