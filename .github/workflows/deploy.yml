name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='storage/' \
            --exclude='profiles/' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.next' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/orator/

      - name: Deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/orator

            # Always rewrite .env from GitHub secrets so key rotation is automatic
            cat > .env << ENVEOF
ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
SECRET_KEY=${{ secrets.SECRET_KEY }}
SITE_ORIGIN=https://${{ secrets.SITE_DOMAIN }}
SESSION_EXPIRY_HOURS=24
MAX_UPLOAD_MB=20
RATE_LIMIT_PER_IP=10
ENVEOF
            chmod 600 .env

            # Replace domain placeholder in nginx config
            sed -i "s/REPLACE_WITH_YOUR_DOMAIN/${{ secrets.SITE_DOMAIN }}/g" nginx/nginx.conf

            # Build and restart
            docker compose pull --quiet 2>/dev/null || true
            docker compose up --build -d --force-recreate --remove-orphans

            # Wait and health-check
            sleep 10
            docker compose ps
          EOF

      - name: Notify success
        run: echo "Deployed successfully to https://${{ secrets.SITE_DOMAIN }}"
